<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GitTale | ПК версия</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="sprites/icon.png">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="version-info">GitTale v0.0.6 (ПК)</div>
    
    <div class="hud">
        <div class="health-bar">❤️ <span id="hpValue">24</span>/24</div>
        <div class="abilities-hud">
            <div class="ability-hud" id="skill1Hud"><span class="key">1</span>КОСТЬ<span class="damage">10</span></div>
            <div class="ability-hud" id="skill2Hud"><span class="key">2</span>ГАСТЕР<span class="damage">50</span></div>
            <div class="ability-hud" id="skill3Hud"><span class="key">3</span>ЗАЛП<span class="damage">30</span></div>
        </div>
        <div class="dash-hud">⚡ <span id="dashReady">ГОТОВ</span></div>
    </div>
    
    <button id="menuButton" class="menu-button">☰</button>
    <button id="fullscreenBtn" class="fullscreen-btn">🖥️</button>
    
    <div id="menuWindow" class="menu-window">
        <div class="menu-window-header"><h3>📋 МЕНЮ</h3></div>
        <div class="menu-window-content">
            <button id="resumeGameBtn" class="menu-btn resume-btn">▶ ВЕРНУТЬСЯ</button>
            <button id="exitGameBtn" class="menu-btn exit-btn">🚪 ВЫЙТИ</button>
        </div>
    </div>
    
    <div id="infoWindow" class="ui-window">
        <div class="ui-window-header"><h3>📜 СТАТИСТИКА</h3><button class="ui-window-close">✕</button></div>
        <div class="ui-window-content">
            <p>Попаданий: <span id="statHits">0</span></p>
            <p>Всего урона: <span id="statDamage">0</span></p>
            <p>Гастеров: <span id="statGaster">0</span></p>
            <hr>
            <p>💡 Клик по лампе — вкл/выкл</p>
            <p>📌 Нажми E у таблички</p>
            <p>🎮 GitTale v0.0.6</p>
        </div>
    </div>
    
    <div id="loader">🔥 ЗАГРУЗКА СПРАЙТОВ...</div>
    
    <script src="js/shared.js"></script>
    <script src="js/pc.js"></script>
</body>
</html>
